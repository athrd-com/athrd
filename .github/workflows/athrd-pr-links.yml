name: Sync Athrd Links In PR Body

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  sync-athrd-links:
    if: github.event.pull_request.state != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Sync Agent-Session trailers in PR body
        uses: actions/github-script@v8
        with:
          script: |
            const TRAILER_KEY = "Agent-Session:";
            const SECTION_DIVIDER = "---";
            const SECTION_HEADING = "# Agent Session(s)";
            const TRAILING_PUNCTUATION = /[.,);\]]+$/;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            const currentBody = context.payload.pull_request.body ?? "";

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const links = [
              ...new Set(
                commits.flatMap((commit) => {
                  const message = commit.commit.message ?? "";
                  const lines = message.split(/\r?\n/);

                  const trailerUrls = lines
                    .filter((line) => line.startsWith(TRAILER_KEY))
                    .map((line) =>
                      line
                        .slice(TRAILER_KEY.length)
                        .trim()
                        .replace(TRAILING_PUNCTUATION, ""),
                    )
                    .filter(Boolean);

                  return trailerUrls;
                }),
              ),
            ];

            let nextBody = currentBody;
            const lines = currentBody.split(/\r?\n/);
            const trailerLineMatcher = new RegExp(`^\\s*${TRAILER_KEY}\\s*`);
            const sectionHeadingMatcher = /^\s{0,3}#\s*Agent Session\(s\)\s*$/m;
            const trailerLineIndexes = lines
              .map((line, index) => ({ line, index }))
              .filter(({ line }) => trailerLineMatcher.test(line))
              .map(({ index }) => index);

            if (links.length === 0) {
              if (trailerLineIndexes.length > 0) {
                nextBody = lines
                  .filter((_, index) => !trailerLineIndexes.includes(index))
                  .join("\n")
                  .replace(/\n{3,}/g, "\n\n")
                  .trimEnd();
              }
            } else {
              const trailerLines = links.map((url) => `${TRAILER_KEY} ${url}`);
              const hasSectionHeading = sectionHeadingMatcher.test(currentBody);

              if (trailerLineIndexes.length > 0) {
                const firstTrailerLine = trailerLineIndexes[0];
                const linesWithoutTrailers = lines.filter(
                  (_, index) => !trailerLineIndexes.includes(index),
                );
                const insertionIndex =
                  firstTrailerLine -
                  trailerLineIndexes.filter((index) => index < firstTrailerLine).length;
                const sectionLines = hasSectionHeading
                  ? []
                  : [SECTION_DIVIDER, SECTION_HEADING];

                linesWithoutTrailers.splice(
                  insertionIndex,
                  0,
                  ...sectionLines,
                  ...trailerLines,
                );
                nextBody = linesWithoutTrailers
                  .join("\n")
                  .replace(/\n{3,}/g, "\n\n")
                  .trimEnd();
              } else if (currentBody.trim().length === 0) {
                const sectionLines = [SECTION_DIVIDER, SECTION_HEADING];
                nextBody = [...sectionLines, ...trailerLines].join("\n");
              } else {
                const sectionLines = hasSectionHeading
                  ? []
                  : [SECTION_DIVIDER, SECTION_HEADING];
                const appendedLines = [...sectionLines, ...trailerLines];
                nextBody = `${currentBody.trimEnd()}\n\n${appendedLines.join("\n")}`;
              }
            }

            if (nextBody === currentBody) {
              core.info("PR body already up to date; skipping update.");
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pullNumber,
              body: nextBody,
            });

            core.info(
              `Updated PR #${pullNumber} with ${links.length} Agent-Session trailer link(s).`,
            );
